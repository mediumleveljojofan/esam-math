<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이샘수학전문학원</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f5f5f5; overflow-x: hidden; }
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('realplace.jpeg') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .academy-name {
            position: absolute;
            top: 20px;
            left: 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .center-logo {
            width: 400px;
            z-index: 10;
        }
        .content-section {
            padding: 100px 20px;
            text-align: center;
            min-height: 100vh;
        }
        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* 모바일 대응 */
            gap: 20px;
            margin-bottom: 50px;
        }
        .nav-btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }
        .nav-btn:hover { background-color: #555; }

        /* 텍스트 및 이미지 등장 영역 */
        #display-area {
            max-width: 800px;
            margin: 0 auto;
            min-height: 400px;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease-out;
            /* 이미지와 텍스트 정렬을 위한 flex */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #display-area.show {
            opacity: 1;
            transform: translateY(0);
        }
        .info-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            display: none; /* 초기에는 숨김 */
        }
        .info-text { font-size: 20px; line-height: 1.6; color: #333; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="academy-name">이샘수학전문학원</div>
        <img src="esamlogo.png" alt="학원 로고" class="center-logo">
    </section>

    <section class="content-section">
        <div class="button-group">
            <button class="nav-btn" onclick="showContent(1)">학원 소개</button>
            <button class="nav-btn" onclick="showContent(2)">수업방식</button>
            <button class="nav-btn" onclick="showContent(3)">상담문의</button>
            <button class="nav-btn" onclick="showContent(4)">오시는 길</button>
        </div>

        <div id="display-area">
            <img id="info-image" class="info-image" src="" alt="상세 이미지">
            <p id="info-content" class="info-text">버튼을 클릭하면 상세 내용이 나타납니다.</p>
        </div>
    </section>

    <script>
        // 데이터 객체에 img 경로 추가
        const contentData = {
            1: {
                text: "성동구 금호동 4가에 위치한 초, 중, 고 수학전문학원입니다. 타임당 정원 6명 이하로 완벽한 개념 이해와 자기주도학습을 극대화 시키는 방식으로 수업이 진행됩니다.",
                img: "소개.png" // 실제 이미지 파일명으로 교체하세요
            },
            2: {
                text: "본 원은 개원부터 하브루타 지도법을 모토로 교육을 하고 있습니다.개념 설명부터 문제 풀이까지 학생이 궁금한 부분이 있다면, 질문에 정답을 가르쳐 주는 것이 아니라 어디서 이해가 안 되었는지부터 파악을 합니다. 문제에 직접적인 해설을 하기보다 문제를 해결해 나가는 과정을 유도합니다.",
                img: "특징표.png" 
            },
            3: {
                text: "상담문의: 02-2294-2325/010-4323-2325",
                img: ""
            },
            4: {
                text: "서울 성동구 금호4가",
                img: "약도.png"
            }
        };

        function showContent(id) {
            const displayArea = document.getElementById('display-area');
            const infoContent = document.getElementById('info-content');
            const infoImage = document.getElementById('info-image');
            
            // 1. 일단 영역을 숨김 (애니메이션 효과)
            displayArea.classList.remove('show');

            setTimeout(() => {
                const data = contentData[id];
                
                // 2. 텍스트와 이미지 소스 변경
                infoContent.textContent = data.text;
                
                if (data.img) {
                    infoImage.src = data.img;
                    infoImage.style.display = "block"; // 이미지 보이기
                } else {
                    infoImage.style.display = "none"; // 이미지 없으면 숨기기
                }

                // 3. 다시 나타나게 함
                displayArea.classList.add('show');
            }, 150); 
        }
    </script>
</body>
</html>
